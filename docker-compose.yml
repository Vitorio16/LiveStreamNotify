version: "3.9"

services:
  webnotify:
    image: webnotify:latest
    container_name: webnotify
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: webnotify
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: webnotify
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: